app:
  cors:
    origins: ${CORS_ORIGINS:http://localhost:5173}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-5.4-mini}
  yahoo:
    client-id: ${YAHOO_CLIENT_ID:}
    client-secret: ${YAHOO_CLIENT_SECRET:}
    redirect-uri: ${YAHOO_REDIRECT_URI:http://localhost:8080/api/yahoo/callback}
    refresh-token: ${YAHOO_REFRESH_TOKEN:}
  cache:
    # playersMapTtlHours: 24
    # defaultTtlMinutes: 5
    # Note: TTLs are set in CacheConfig; change there if needed.
    playersTtlMinutes: 1440
    leagueTtlMinutes: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info

info:
  app:
    name: Sleeper League Advisor Backend
    version: 0.1.0

logging:
  level:
    root: INFO
    com.sleeper.advisor: DEBUG
